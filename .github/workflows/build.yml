name: Build and Upload to App Store

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  APP_NAME: AVIX-AI
  SCHEME: AVIX-AI
  BUNDLE_ID: com.uamkoreatech.abdsgcs
  XCODE_VERSION: "15.4"

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Setup Keychain and Certificate
        run: |
          base64 --decode -i provisioning/dist_certificate.b64 -o $RUNNER_TEMP/cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "ci_keychain_pass" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "ci_keychain_pass" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/cert.p12 -P "blisd2024" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "ci_keychain_pass" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install Provisioning Profile
        run: |
          base64 --decode -i provisioning/avixai_appstore.b64 -o $RUNNER_TEMP/profile.mobileprovision
          PP_UUID=$(/usr/bin/security cms -D -i $RUNNER_TEMP/profile.mobileprovision | plutil -extract UUID raw -)
          TEAM_ID=$(/usr/bin/security cms -D -i $RUNNER_TEMP/profile.mobileprovision | plutil -extract TeamIdentifier.0 raw -)
          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV
          echo "TEAM_ID=$TEAM_ID" >> $GITHUB_ENV
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $RUNNER_TEMP/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision
          echo "Profile UUID: $PP_UUID"
          echo "Team ID: $TEAM_ID"

      - name: Generate App Icon
        run: |
          python3 - << 'PYEOF'
          import struct, zlib, os
          def make_png(w, h, r, g, b):
            def chunk(ct, data):
              c = ct + data
              return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
            ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
            row = bytes([0]) + bytes([r, g, b] * w)
            idat = zlib.compress(row * h, 9)
            return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', idat) + chunk(b'IEND', b'')
          with open('AVIX-AI/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png', 'wb') as f:
            f.write(make_png(1024, 1024, 30, 80, 160))
          print('Icon created')
          PYEOF
          cat > AVIX-AI/Assets.xcassets/AppIcon.appiconset/Contents.json << 'CEOF'
          {
            "images" : [
              {
                "filename" : "AppIcon-1024.png",
                "idiom" : "universal",
                "platform" : "ios",
                "size" : "1024x1024"
              }
            ],
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          CEOF
          /usr/libexec/PlistBuddy -c "Add :UIRequiresFullScreen bool true" AVIX-AI/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :UIRequiresFullScreen true" AVIX-AI/Info.plist

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project $APP_NAME.xcodeproj \
            -scheme $SCHEME \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/$APP_NAME.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$PP_UUID" \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            ENABLE_ON_DEMAND_RESOURCES=NO \
            ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS=NO

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << PEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>$TEAM_ID</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>$BUNDLE_ID</key>
                  <string>$PP_UUID</string>
              </dict>
              <key>uploadBitcode</key>
              <false/>
          </dict>
          </plist>
          PEOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/$APP_NAME.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist
          IPA_PATH=$(find $RUNNER_TEMP/export -name "*.ipa" | head -1)
          cp "$IPA_PATH" $RUNNER_TEMP/$APP_NAME.ipa
          echo "IPA created: $RUNNER_TEMP/$APP_NAME.ipa"
          ls -la $RUNNER_TEMP/$APP_NAME.ipa

      - name: Upload to App Store Connect
        run: |
          mkdir -p ~/private_keys
          base64 --decode -i provisioning/api_key_avixai.b64 -o ~/private_keys/AuthKey_599L62H6Y8.p8
          xcrun altool --upload-app \
            -f "$RUNNER_TEMP/$APP_NAME.ipa" \
            -t ios \
            --apiKey "599L62H6Y8" \
            --apiIssuer "e4c69502-cb98-4fed-b19b-e01d47c5c358"

      - name: Clean up
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f $RUNNER_TEMP/cert.p12
          rm -f $RUNNER_TEMP/profile.mobileprovision
          rm -f ~/private_keys/AuthKey_599L62H6Y8.p8
