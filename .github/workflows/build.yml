name: Build and Upload to App Store

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  APP_NAME: AVIX-AI
  SCHEME: AVIX-AI
  BUNDLE_ID: com.uamkoreatech.abdsgcs
  XCODE_VERSION: "15.4"

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Setup Keychain and Certificate
        run: |
          base64 --decode -i provisioning/dist_certificate.b64 -o $RUNNER_TEMP/cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "ci_keychain_pass" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "ci_keychain_pass" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/cert.p12 -P "blisd2024" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "ci_keychain_pass" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install Provisioning Profile
        run: |
          base64 --decode -i provisioning/avixai_appstore.b64 -o $RUNNER_TEMP/profile.mobileprovision
          PP_UUID=$(/usr/bin/security cms -D -i $RUNNER_TEMP/profile.mobileprovision | plutil -extract UUID raw -)
          PP_NAME=$(/usr/bin/security cms -D -i $RUNNER_TEMP/profile.mobileprovision | plutil -extract Name raw -)
          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV
          echo "PP_NAME=$PP_NAME" >> $GITHUB_ENV
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $RUNNER_TEMP/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision
          echo "Profile UUID: $PP_UUID"
          echo "Profile Name: $PP_NAME"

      - name: Build Unsigned Archive
        run: |
          xcodebuild archive \
            -project $APP_NAME.xcodeproj \
            -scheme $SCHEME \
            -configuration Release \
            -archivePath $RUNNER_TEMP/$APP_NAME.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create ExportOptions.plist
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>destination</key>
            <string>upload</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>teamID</key>
            <string>545S5F426R</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>$BUNDLE_ID</key>
              <string>${{ env.PP_UUID }}</string>
            </dict>
          </dict>
          </plist>
          PLIST
          echo "ExportOptions.plist created:"
          cat $RUNNER_TEMP/ExportOptions.plist

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/$APP_NAME.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload to App Store Connect
        run: |
          mkdir -p ~/private_keys
          base64 --decode -i provisioning/api_key_avixai.b64 -o ~/private_keys/AuthKey_599L62H6Y8.p8
          xcrun altool --upload-app \
            -f "$RUNNER_TEMP/export/$APP_NAME.ipa" \
            -t ios \
            --apiKey "599L62H6Y8" \
            --apiIssuer "e4c69502-cb98-4fed-b19b-e01d47c5c358"

      - name: Clean up
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f $RUNNER_TEMP/cert.p12
          rm -f $RUNNER_TEMP/profile.mobileprovision
          rm -f ~/private_keys/AuthKey_599L62H6Y8.p8
