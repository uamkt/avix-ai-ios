name: Build and Upload to App Store

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  APP_NAME: AVIX-AI
  SCHEME: AVIX-AI
  BUNDLE_ID: com.uamkoreatech.abdsgcs
  XCODE_VERSION: "16.2"

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Setup Keychain and Certificate
        run: |
          base64 --decode -i provisioning/dist_certificate.b64 -o $RUNNER_TEMP/cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "ci_keychain_pass" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "ci_keychain_pass" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/cert.p12 -P "blisd2024" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "ci_keychain_pass" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install Provisioning Profile
        run: |
          base64 --decode -i provisioning/avixai_appstore.b64 -o $RUNNER_TEMP/profile.mobileprovision
          PP_UUID=$(/usr/bin/security cms -D -i $RUNNER_TEMP/profile.mobileprovision | plutil -extract UUID raw -)
          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $RUNNER_TEMP/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision
          echo "Profile UUID: $PP_UUID"
      - name: Generate App Icon
        run: |
          python3 - << 'PYEOF'
          import struct, zlib, os
          def make_png(w, h, r, g, b):
              def chunk(ct, data):
                  c = ct + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
              row = bytes([0]) + bytes([r, g, b] * w)
              idat = zlib.compress(row * h, 9)
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', idat) + chunk(b'IEND', b'')
          with open('AVIX-AI/Assets.xcassets/AppIcon.appiconset/AppIcon-1024.png', 'wb') as f:
              f.write(make_png(1024, 1024, 30, 80, 160))
          print('Icon created')
          PYEOF
          cat > AVIX-AI/Assets.xcassets/AppIcon.appiconset/Contents.json << 'CEOF'
          {
            "images" : [
              {
                "filename" : "AppIcon-1024.png",
                "idiom" : "universal",
                "platform" : "ios",
                "size" : "1024x1024"
              }
            ],
            "info" : {
              "author" : "xcode",
              "version" : 1
            }
          }
          CEOF


      - name: Build Unsigned Archive
        run: |
          xcodebuild archive \
            -project $APP_NAME.xcodeproj \
            -scheme $SCHEME \
            -configuration Release \
            -archivePath $RUNNER_TEMP/$APP_NAME.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
                        IPHONEOS_DEPLOYMENT_TARGET=17.0

      - name: Sign and Create IPA
        run: |
          APP_PATH=$RUNNER_TEMP/$APP_NAME.xcarchive/Products/Applications/$APP_NAME.app

          echo "=== Embedding provisioning profile ==="
          cp $RUNNER_TEMP/profile.mobileprovision "$APP_PATH/embedded.mobileprovision"

          echo "=== Finding signing identity ==="
          IDENTITY=$(security find-identity -v -p codesigning $RUNNER_TEMP/app-signing.keychain-db | grep "Apple Distribution" | head -1 | awk -F'"' '{print $2}')
          echo "Signing with: $IDENTITY"

          echo "=== Extracting entitlements from profile ==="
          /usr/bin/security cms -D -i $RUNNER_TEMP/profile.mobileprovision > $RUNNER_TEMP/profile_full.plist
          /usr/libexec/PlistBuddy -x -c "Print :Entitlements" $RUNNER_TEMP/profile_full.plist > $RUNNER_TEMP/entitlements.plist
          echo "Entitlements:"
          cat $RUNNER_TEMP/entitlements.plist

          echo "=== Signing frameworks ==="
          if [ -d "$APP_PATH/Frameworks" ]; then
            for framework in "$APP_PATH/Frameworks/"*; do
              /usr/bin/codesign --force --sign "$IDENTITY" --keychain $RUNNER_TEMP/app-signing.keychain-db "$framework"
            done
          fi

          echo "=== Signing app ==="
          /usr/bin/codesign --force --sign "$IDENTITY" \
            --keychain $RUNNER_TEMP/app-signing.keychain-db \
            --entitlements $RUNNER_TEMP/entitlements.plist \
            --timestamp \
            "$APP_PATH"

          echo "=== Verifying signature ==="
          /usr/bin/codesign --verify --deep --strict "$APP_PATH"
          echo "Signature verified successfully"

          echo "=== Creating IPA ==="
          mkdir -p $RUNNER_TEMP/Payload
          cp -R "$APP_PATH" $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP
          /usr/bin/zip -r $RUNNER_TEMP/$APP_NAME.ipa Payload
          echo "IPA created: $RUNNER_TEMP/$APP_NAME.ipa"
          ls -la $RUNNER_TEMP/$APP_NAME.ipa

      - name: Upload to App Store Connect
        run: |
          mkdir -p ~/private_keys
          base64 --decode -i provisioning/api_key_avixai.b64 -o ~/private_keys/AuthKey_599L62H6Y8.p8
          xcrun altool --upload-app \
            -f "$RUNNER_TEMP/$APP_NAME.ipa" \
            -t ios \
            --apiKey "599L62H6Y8" \
            --apiIssuer "e4c69502-cb98-4fed-b19b-e01d47c5c358"

      - name: Clean up
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f $RUNNER_TEMP/cert.p12
          rm -f $RUNNER_TEMP/profile.mobileprovision
          rm -f ~/private_keys/AuthKey_599L62H6Y8.p8
