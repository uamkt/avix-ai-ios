name: Build and Upload to App Store

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  APP_NAME: AVIX-AI
  SCHEME: AVIX-AI
  BUNDLE_ID: com.uamkoreatech.abdsgcs
  XCODE_VERSION: "15.4"

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Setup Keychain and Certificate
        run: |
          # Decode certificate
          base64 --decode -i provisioning/dist_certificate.b64 -o $RUNNER_TEMP/cert.p12

          # Create and configure keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "ci_keychain_pass" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "ci_keychain_pass" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/cert.p12 -P "blisd2024" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "ci_keychain_pass" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Install Provisioning Profile
        run: |
          # Decode provisioning profile
          base64 --decode -i provisioning/avixai_appstore.b64 -o $RUNNER_TEMP/profile.mobileprovision

          # Extract UUID from profile
          PP_UUID=$(/usr/bin/security cms -D -i $RUNNER_TEMP/profile.mobileprovision | plutil -extract UUID raw -)
          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV

          # Extract Team ID
          TEAM_ID=$(/usr/bin/security cms -D -i $RUNNER_TEMP/profile.mobileprovision | plutil -extract TeamIdentifier.0 raw -)
          echo "TEAM_ID=$TEAM_ID" >> $GITHUB_ENV

          # Extract Profile Name
          PP_NAME=$(/usr/bin/security cms -D -i $RUNNER_TEMP/profile.mobileprovision | plutil -extract Name raw -)
          echo "PP_NAME=$PP_NAME" >> $GITHUB_ENV

          # Install profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $RUNNER_TEMP/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

          echo "Profile UUID: $PP_UUID"
          echo "Team ID: $TEAM_ID"
          echo "Profile Name: $PP_NAME"

      - name: Build Unsigned Archive
        run: |
          xcodebuild archive \
            -project $APP_NAME.xcodeproj \
            -scheme $SCHEME \
            -configuration Release \
            -archivePath $RUNNER_TEMP/$APP_NAME.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Sign App
        run: |
          APP_PATH="$RUNNER_TEMP/$APP_NAME.xcarchive/Products/Applications/$APP_NAME.app"

          # Extract entitlements from the unsigned app
          codesign -d --entitlements - "$APP_PATH" > $RUNNER_TEMP/entitlements.plist 2>/dev/null || true

          # If no entitlements extracted, create minimal one
          if [ ! -s $RUNNER_TEMP/entitlements.plist ]; then
            cat > $RUNNER_TEMP/entitlements.plist << 'ENTITLEMENTS'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>application-identifier</key>
            <string>${{ env.TEAM_ID }}.${{ env.BUNDLE_ID }}</string>
            <key>com.apple.developer.team-identifier</key>
            <string>${{ env.TEAM_ID }}</string>
            <key>get-task-allow</key>
            <false/>
          </dict>
          </plist>
          ENTITLEMENTS
          fi

          # Embed provisioning profile
          cp $RUNNER_TEMP/profile.mobileprovision "$APP_PATH/embedded.mobileprovision"

          # Sign the app
          codesign --force --sign "Apple Distribution" \
            --entitlements $RUNNER_TEMP/entitlements.plist \
            --timestamp \
            "$APP_PATH"

      - name: Package IPA
        run: |
          mkdir -p $RUNNER_TEMP/Payload
          cp -r "$RUNNER_TEMP/$APP_NAME.xcarchive/Products/Applications/$APP_NAME.app" $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP
          zip -r $APP_NAME.ipa Payload

      - name: Upload to App Store Connect
        run: |
          # Decode API key and place in standard location
          mkdir -p ~/private_keys
          base64 --decode -i provisioning/api_key_avixai.b64 -o ~/private_keys/AuthKey_599L62H6Y8.p8

          xcrun altool --upload-app \
            -f $RUNNER_TEMP/$APP_NAME.ipa \
            -t ios \
            --apiKey "599L62H6Y8" \
            --apiIssuer "e4c69502-cb98-4fed-b19b-e01d47c5c358"

      - name: Clean up
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f $RUNNER_TEMP/cert.p12
          rm -f $RUNNER_TEMP/profile.mobileprovision
          rm -f ~/private_keys/AuthKey_599L62H6Y8.p8
          rm -f $RUNNER_TEMP/entitlements.plist
          rm -rf $RUNNER_TEMP/Payload
